<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Findly</title>
    <link rel="stylesheet" href="fontawesome-free-7.1.0-web/css/all.min.css">
    <link rel="stylesheet" href="registro.css">

    <!-- Cambiamos el icono de la pagina web -->
    <link rel="shortcut icon" href="img/logo.png">
</head>
<body>

    <!-- MENU PRINCIPAL -->
    <nav class="nav-principal">

        <!-- Logo -->
        <div class="logo">
        <img src="img/logo.png" alt="Logo">
        <a href="index.html">Findly</a>
        </div>

        <!-- Menu -->
        <div class="enlaces">
            <a href="musica.html">Música</a>
            <a href="libros.html">Libros</a>
            <a href="moda.html">Moda</a>
            <a href="videojuegos.html">Videojuegos</a>
        </div>

        <!-- Buscador -->
        <div class="input-search">
            <i class="fas fa-search"></i>
            <input type="text" name="" id="" placeholder="Encuentra lo ideal para ti sobre libros, moda, etc.">
        </div>

        <!-- Inicio / Registro Usuario -->
         <div class="enlaces-usuario">
            <a href="inicioSesion.html">Iniciar sesión</a>
            <a href="registro.html">Registrase</a>
         </div>
        
    </nav>

    <header>

        <!-- Registro de usuario -->
        <section class="card-registro">
            <h2>Crear una cuenta</h2>
            <p class="p-secundario">Únete a nuestra comunidad y empieza a compartir tus listas favoritas.</p>

            <form action="" method="POST" class="form-registro">
    
                <!-- Campos esenciales -->
                <label for="username">Nombre de usuario*</label>
                <input type="text" id="username" name="username" placeholder="Nombre de usuario" required>

                <label for="email">Correo electrónico*</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>

                <label for="password">Contraseña*</label>
                <input type="password" id="password" name="password" placeholder="Contraseña" required>

                <label for="confirm-password">Confirmar contraseña*</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Contraseña" required>

                <!-- Campos opcionales -->
                <label for="bio">Biografía corta (opcional)</label>
                <textarea id="bio" name="bio" placeholder="Cuéntanos un poco sobre ti..." rows="3"></textarea>

                <fieldset>
                    <legend>Intereses iniciales (opcional)</legend>
                    <label class="opcion-intereses">
                        <input type="checkbox" name="intereses" value="musica"> Música
                    </label>
                    <label class="opcion-intereses">
                        <input type="checkbox" name="intereses" value="libros"> Libros
                    </label>
                    <label class="opcion-intereses">
                        <input type="checkbox" name="intereses" value="videojuegos"> Videojuegos
                    </label>
                    <label class="opcion-intereses">
                        <input type="checkbox" name="intereses" value="moda"> Moda
                    </label>
                </fieldset>

                <!-- Botón de envío -->
                <button type="submit">Registrarse</button>

                <p class="login-link">¿Ya tienes una cuenta? <a href="inicioSesion.html">Inicia sesión</a></p>

            </form>
        </section>

    </header>

    <!-- Pie de pagina -->
    <footer class="copy">
        <p>Términos del servicio</p>
        <p>Política de privacidad</p>
        <p>Ayuda</p>
    </footer>
    
</body>
</html>
